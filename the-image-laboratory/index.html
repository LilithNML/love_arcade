<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The Image Laboratory</title>
  <meta name="description" content="Suite de procesamiento de imágenes del lado del cliente. Sin servidor, sin trackers." />
  <meta name="theme-color" content="#0F0F0F" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark" aria-hidden="true">
          <i data-lucide="flask-conical"></i>
        </div>
        <div class="logo-text">
          <h1 class="logo-title">The Image Laboratory</h1>
          <p class="logo-sub">Client-Side · Privacy by Design · v1.0</p>
        </div>
      </div>
      <div class="header-right">
        <span class="live-badge">
          <span class="live-dot" aria-hidden="true"></span>
          Sin servidor
        </span>
      </div>
    </div>
  </header>

  <!-- ===== MODULE NAVIGATION ===== -->
  <nav class="module-nav" role="navigation" aria-label="Módulos del laboratorio">
    <div class="nav-inner">
      <button class="nav-btn active" data-module="store-manager" aria-selected="true" role="tab">
        <i data-lucide="layers" class="nav-icon"></i>
        <span class="nav-label">
          <span class="nav-num">I</span>
          Store Manager
        </span>
        <span class="nav-sub">Wallpapers &amp; Thumbs</span>
      </button>
      <button class="nav-btn" data-module="puzzle-creator" aria-selected="false" role="tab">
        <i data-lucide="grid-3x3" class="nav-icon"></i>
        <span class="nav-label">
          <span class="nav-num">II</span>
          Puzzle Creator
        </span>
        <span class="nav-sub">Assets 1440px</span>
      </button>
      <button class="nav-btn" data-module="smart-compressor" aria-selected="false" role="tab">
        <i data-lucide="minimize-2" class="nav-icon"></i>
        <span class="nav-label">
          <span class="nav-num">III</span>
          Compressor
        </span>
        <span class="nav-sub">Thumbnail Optimizer</span>
      </button>
      <button class="nav-btn" data-module="filename-extractor" aria-selected="false" role="tab">
        <i data-lucide="file-text" class="nav-icon"></i>
        <span class="nav-label">
          <span class="nav-num">IV</span>
          Filename Extractor
        </span>
        <span class="nav-sub">Lista de Nombres</span>
      </button>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="app-main" id="app-main" role="main">
    <div class="module-loader" id="module-loader">
      <div class="loader-spinner"></div>
      <span>Cargando módulo…</span>
    </div>
  </main>

  <!-- ===== CROP MODAL =====
       IMPORTANT: El modal debe estar fuera del flujo del documento principal
       para que Cropper.js pueda calcular correctamente las dimensiones.
  -->
  <div class="modal-backdrop" id="crop-modal-backdrop" aria-hidden="true"></div>
  <div
    class="modal-dialog"
    id="crop-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="crop-modal-title"
  >
    <div class="modal-header">
      <div class="modal-header__left">
        <i data-lucide="crop" class="modal-title-icon"></i>
        <h2 class="modal-title" id="crop-modal-title">Editor de Recorte</h2>
        <span class="aspect-chip" id="crop-aspect-badge">16:9</span>
      </div>
      <div class="modal-header__right">
        <span class="modal-filename" id="crop-modal-filename"></span>
        <span class="modal-dims" id="crop-dims" title="Resolución original"></span>
        <button class="close-btn" id="crop-modal-close" aria-label="Cerrar">
          <i data-lucide="x"></i>
        </button>
      </div>
    </div>

    <!-- Crop Container - fixed height, Cropper.js needs determined dimensions -->
    <div class="crop-stage" id="crop-stage">
      <!-- Loading state shown while image loads -->
      <div class="crop-loading" id="crop-loading">
        <div class="loader-spinner"></div>
        <span>Cargando imagen…</span>
      </div>
      <!-- The image Cropper.js will initialize on -->
      <img
        id="crop-image"
        src=""
        alt="Imagen para recortar"
        style="display:block; max-width:100%; max-height:100%;"
      />
    </div>

    <div class="modal-footer">
      <p class="modal-hint">
        <i data-lucide="move" style="width:13px;height:13px;flex-shrink:0"></i>
        Mueve y redimensiona para ajustar el área de recorte
      </p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="crop-reset-btn">
          <i data-lucide="rotate-ccw"></i>
          Resetear
        </button>
        <button class="btn btn-primary" id="crop-apply-btn">
          <i data-lucide="check"></i>
          Aplicar Recorte
        </button>
      </div>
    </div>
  </div>

  <!-- ===== PROGRESS PILL ===== -->
  <div class="progress-pill" id="global-progress" aria-live="polite">
    <div class="progress-pill__bar-wrap">
      <div class="progress-pill__bar" id="global-progress-bar"></div>
    </div>
    <span class="progress-pill__label" id="global-progress-label">Procesando…</span>
    <button class="close-btn close-btn--sm" id="global-progress-close" aria-label="Cerrar progreso">
      <i data-lucide="x"></i>
    </button>
  </div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-stack" id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>

  <!-- App Entry -->
  <script type="module" src="js/app.js"></script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
