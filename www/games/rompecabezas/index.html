<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rompecabezas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./src/style.css">

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0B0F19">
</head>
<body>

    <div id="dynamic-bg" class="dynamic-bg" aria-hidden="true"></div>
    <div class="bg-pattern" aria-hidden="true"></div>

    <main id="app">

        <!-- TOP BAR -->
        <header class="top-bar" role="banner">
            <div class="brand" aria-label="Love Arcade — Neural Puzzle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7" rx="2"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="2"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="2"></rect>
                    <path d="M3 14h7v7H3z"></path>
                </svg>
                <div>NEURAL<span class="game-tag">PUZZLE</span></div>
            </div>
        </header>

        <!-- MENU -->
        <section id="screen-menu" class="screen active" aria-label="Menú principal">
            <div class="menu-content">
                <h1 class="game-title">NEURAL<br>PUZZLE</h1>
                <p class="game-subtitle">Arcade Edition</p>
                <nav class="main-nav" aria-label="Navegación principal">
                    <button id="btn-play" class="btn btn-primary" type="button">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z" fill="currentColor"></path></svg>
                        JUGAR
                    </button>
                    <button id="btn-levels" class="btn btn-secondary" type="button">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>
                        NIVELES
                    </button>
                    <button id="btn-settings" class="btn btn-secondary" type="button">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        AJUSTES
                    </button>
                    <button id="btn-exit" class="btn btn-danger" type="button">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        SALIR
                    </button>
                </nav>
            </div>
        </section>

        <!-- LEVELS -->
        <section id="screen-levels" class="screen" aria-label="Selección de misiones">
            <div class="screen-header">
                <button class="btn-icon btn-back" data-target="screen-menu" type="button" aria-label="Volver al menú principal">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <h2>MISIONES</h2>
            </div>
            <div class="levels-grid" id="levels-container" role="list" aria-label="Lista de niveles" aria-live="polite"></div>
        </section>

        <!-- GAME -->
        <section id="screen-game" class="screen" aria-label="Partida activa">
            <div class="hud" role="toolbar" aria-label="Panel de control">
                <button class="btn-icon" id="btn-pause" type="button" aria-label="Pausar partida">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"></rect><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"></rect></svg>
                </button>

                <div class="hud-stats" aria-label="Estadísticas de la partida">
                    <div class="hud-stat">
                        <span class="value" id="hud-level" aria-label="Nivel actual">LVL 1</span>
                    </div>
                </div>

                <div class="hud-actions">
                    <button id="btn-preview" class="btn-hud-action" type="button" aria-label="Vista previa">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                    <button id="btn-magnet" class="btn-hud-action gold" type="button" aria-label="Imán automático">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12h-2a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2H5a2 2 0 0 0-2 2v7h18v-7a2 2 0 0 0-2-2z"></path><path d="M8 12V7a4 4 0 0 1 8 0v5"></path></svg>
                    </button>
                </div>
            </div>

            <div class="canvas-wrapper" id="game-container">
                <div id="game-loader" class="loading-overlay hidden" role="status" aria-label="Cargando nivel…">
                    <div class="spinner"></div>
                </div>
                <canvas id="puzzle-canvas" role="img" aria-label="Tablero del rompecabezas"></canvas>
            </div>
        </section>

        <!-- SETTINGS -->
        <section id="screen-settings" class="screen" aria-label="Ajustes del juego">
            <div class="screen-header">
                <button class="btn-icon btn-back" data-target="screen-menu" type="button" aria-label="Volver al menú principal">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <h2>AJUSTES</h2>
            </div>
            <div class="settings-list">
                <div class="setting-item">
                    <label for="setting-sound">Efectos de Sonido</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-sound" checked aria-label="Activar o desactivar efectos de sonido">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <!-- MODALS -->
        <div id="modal-resume" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-resume-title">
            <div class="modal-content">
                <h3 id="modal-resume-title">PARTIDA GUARDADA</h3>
                <p>¿Continuar donde lo dejaste?</p>
                <div class="modal-actions">
                    <button id="btn-yes-resume" class="btn btn-primary" type="button">CONTINUAR</button>
                    <button id="btn-no-resume"  class="btn btn-secondary" type="button">REINICIAR</button>
                </div>
            </div>
        </div>

        <div id="modal-pause" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-pause-title">
            <div class="modal-content">
                <h3 id="modal-pause-title">PAUSA</h3>
                <div class="modal-actions">
                    <button id="btn-resume" class="btn btn-primary" type="button">REANUDAR</button>
                    <button id="btn-quit-level" class="btn btn-danger" type="button">ABANDONAR</button>
                </div>
            </div>
        </div>

        <div id="modal-victory" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-victory-title">
            <div class="modal-content">
                <h3 id="modal-victory-title" class="text-success">¡MISIÓN CUMPLIDA!</h3>
                <div class="victory-reward">
                    <span class="reward-plus">+</span><span id="victory-coins">0</span>
                    <svg class="icon-coin" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v12m-3-6h6" stroke="#0B0F19" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                </div>
                <div class="modal-actions">
                    <button id="btn-next-level" class="btn btn-primary" type="button">SIGUIENTE</button>
                    <button id="btn-victory-menu" class="btn btn-secondary" type="button">MENÚ</button>
                </div>
            </div>
        </div>

        <div id="modal-alert" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-alert-title">
            <div class="modal-content">
                <h3 id="modal-alert-title">AVISO</h3>
                <p id="modal-alert-message"></p>
                <div class="modal-actions">
                    <button id="btn-alert-ok" class="btn btn-primary" type="button">ENTENDIDO</button>
                </div>
            </div>
        </div>

        <div id="modal-confirm" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-confirm-title">
            <div class="modal-content">
                <h3 id="modal-confirm-title">CONFIRMAR</h3>
                <p id="modal-confirm-message"></p>
                <div class="modal-actions">
                    <button id="btn-confirm-yes" class="btn btn-primary" type="button">SÍ</button>
                    <button id="btn-confirm-no" class="btn btn-secondary" type="button">NO</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../../js/supabase-loader.js"></script>
    <script src="../../js/haptics.js"></script>
    <script src="../../js/app.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
