apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

import java.util.Properties
import java.io.FileInputStream

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseStoreFile = keystoreProperties['storeFile'] ?: System.getenv("ANDROID_KEYSTORE_PATH")
def releaseStorePassword = keystoreProperties['storePassword'] ?: System.getenv("ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = keystoreProperties['keyAlias'] ?: System.getenv("ANDROID_KEY_ALIAS")
def releaseKeyPassword = keystoreProperties['keyPassword'] ?: System.getenv("ANDROID_KEY_PASSWORD")
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "com.lovearcade.app"
        compileSdk 35
            
                defaultConfig {
                        applicationId "com.lovearcade.app"
                                minSdk 23
                                        targetSdk 35
                                                versionCode 1
                                                        versionName "1.0"
                                                            }

                                                                compileOptions {
                                                                        sourceCompatibility JavaVersion.VERSION_17
                                                                                targetCompatibility JavaVersion.VERSION_17
                                                                                    }

                                                                                        kotlinOptions {
                                                                                                jvmTarget = '17'
                                                                                                    }
                                                                                                    signingConfigs {
                                                                                                        release {
                                                                                                            if (hasReleaseSigning) {
                                                                                                                storeFile file(releaseStoreFile)
                                                                                                                storePassword releaseStorePassword
                                                                                                                keyAlias releaseKeyAlias
                                                                                                                keyPassword releaseKeyPassword
                                                                                                            }
                                                                                                        }
                                                                                                    }
                                                                                                    buildTypes {
                                                                                                        release {
                                                                                                            minifyEnabled false
                                                                                                            shrinkResources false
                                                                                                            if (hasReleaseSigning) {
                                                                                                                signingConfig signingConfigs.release
                                                                                                            }
                                                                                                        }
                                                                                                    }
                                                                                                    }


repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    constraints {
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0") {
            because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib")
        }
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0") {
            because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib")
        }
    }
}

apply from: 'capacitor.build.gradle'

gradle.taskGraph.whenReady { graph ->
    def requestedReleaseBuild = graph.allTasks.any { task ->
        task.name == 'assembleRelease' || task.name == 'bundleRelease'
    }
    if (requestedReleaseBuild && !hasReleaseSigning) {
        throw new GradleException(
            "Falta configuración de firma release. Define android/keystore.properties o variables ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS y ANDROID_KEY_PASSWORD."
        )
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
